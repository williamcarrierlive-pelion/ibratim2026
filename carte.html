<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e0c09">
<title>Notre invitation — Ibrahim &amp; Fatim — 19.09.26</title>
<!-- Aperçu lors du partage (réseaux sociaux / messageries) -->
<meta property="og:title" content="Ibrahim &amp; Fatim — Notre invitation">
<meta property="og:description" content="Touchez la carte pour l'ouvrir · Samedi 19 septembre 2026 · Abidjan · #Ibratim2026">
<meta property="og:image" content="https://ibratim2026.github.io/og-image.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ibratim2026.github.io/carte.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Ibrahim &amp; Fatim — Notre invitation">
<meta name="twitter:description" content="Touchez la carte pour l'ouvrir · 19 septembre 2026 · Abidjan">
<meta name="twitter:image" content="https://ibratim2026.github.io/og-image.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --or:#c9a227; --or-vif:#e8c34d; --or-pale:#e6d9ae; --noir:#0e0c09;
    /* largeur d'une carte (ratio 2:3). Une seule page à la fois -> jamais de débordement. */
    --w:min(340px, 86vw, calc((100dvh - 180px) / 1.5));
    --h:calc(var(--w) * 1.5);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Montserrat',sans-serif;color:var(--or-pale);
    min-height:100dvh;
    background:
      radial-gradient(ellipse 80% 55% at 50% 0%, rgba(201,162,39,.14), transparent 60%),
      var(--noir);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(1rem,3.5vw,1.6rem);padding:1.2rem;overflow-x:hidden}
  .titre{font-family:'Allura',cursive;font-size:clamp(1.9rem,6vw,2.9rem);
    background:linear-gradient(110deg,#8a6d1f 20%,var(--or-vif) 38%,#fff3c4 50%,var(--or-vif) 62%,#8a6d1f 80%);
    background-size:220% auto;-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;animation:brillance 4.2s linear infinite;text-align:center}
  @keyframes brillance{to{background-position:-220% center}}
  .hint{font-size:clamp(.62rem,2.6vw,.72rem);letter-spacing:.24em;text-transform:uppercase;
    color:rgba(230,217,174,.75);text-align:center}

  /* ===== flip card : deux images (recto/verso) ===== */
  .scene{perspective:1800px;-webkit-perspective:1800px;width:var(--w);height:var(--h)}
  .card{position:relative;width:100%;height:100%;transform-style:preserve-3d;cursor:pointer;
    transition:transform 1.05s cubic-bezier(.6,.05,.28,.99)}
  .card.ouvert{transform:rotateY(-180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:6px;overflow:hidden;box-shadow:0 22px 60px rgba(0,0,0,.6)}
  .face img{display:block;width:100%;height:100%;object-fit:cover}
  .verso{transform:rotateY(180deg)}

  .liens{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
  .btn{display:inline-block;padding:.7rem 1.6rem;border:1px solid var(--or);color:var(--or-pale);
    text-decoration:none;font-size:.72rem;letter-spacing:.24em;text-transform:uppercase;transition:.3s;
    -webkit-tap-highlight-color:transparent}
  .btn:hover{background:var(--or);color:var(--noir)}
  @media(hover:none){ .btn:hover{background:transparent;color:var(--or-pale)} }
</style>
</head>
<body>

<h1 class="titre">Notre invitation</h1>

<div class="scene">
  <div class="card" id="card" role="button" tabindex="0" aria-label="Ouvrir la carte d'invitation">
    <div class="face recto"><img src="carte-recto.jpg" alt="Couverture — Ibrahim &amp; Fatim, 19 septembre 2026"></div>
    <div class="face verso"><img src="carte-verso.jpg" alt="Invitation — programme, lieu et RSVP"></div>
  </div>
</div>

<p class="hint" id="hint">Touchez la carte pour l'ouvrir</p>

<div class="liens">
  <a class="btn" href="index.html">Visiter le site</a>
</div>

<script>
  const card = document.getElementById('card');
  const hint = document.getElementById('hint');
  function bascule(){
    card.classList.toggle('ouvert');
    const ouvert = card.classList.contains('ouvert');
    hint.textContent = ouvert ? 'Touchez pour refermer' : 'Touchez la carte pour l’ouvrir';
    card.setAttribute('aria-label', ouvert ? 'Refermer la carte' : 'Ouvrir la carte d’invitation');
  }
  card.addEventListener('click', bascule);
  card.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); bascule(); } });
</script>
</body>
</html>
